<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Vocabulary Trainer</title>
    
    <link rel="stylesheet" href="GLstyle.css">
</head>
    <script src="GLscript.js"></script>
<body>

<nav class="navbar">
    <div class="logo">
        🇩🇪 German Trainer
    </div>

    <ul class="nav-links">
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Study</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Statistics</a></li>
        <li><a href="#">Settings</a></li>
    </ul>
</nav>

<div class="container">

    <h1>Welcome!</h1>

    <p class="subtitle">
        Learn German vocabulary through active recall.
    </p>

    <div class="card">

        <h2 id="question">
            der Hund
        </h2>

        <input
            type="text"
            id="answer"
            placeholder="Type the English translation..."
            autocomplete="off">

        <button id="checkButton">
            Check
        </button>

        <p id="feedback"></p>

    </div>

    <div class="stats">

        <div class="stat">
            <h3>Words Learned</h3>
            <p id="learned">0</p>
        </div>

        <div class="stat">
            <h3>Accuracy</h3>
            <p id="accuracy">0%</p>
        </div>

        <div class="stat">
            <h3>Current Streak</h3>
            <p id="streak">0</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
